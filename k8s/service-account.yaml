# =============================================================================
# Kubernetes Service Account
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: directioner
  namespace: directioner
  labels:
    app.kubernetes.io/name: directioner
---
# =============================================================================
# Kubernetes Secrets (create manually or use external secrets)
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: directioner-secrets
  namespace: directioner
  labels:
    app.kubernetes.io/name: directioner
type: Opaque
stringData:
  # Replace these with your actual values
  discord-bot-token: "YOUR_DISCORD_BOT_TOKEN"
  discord-application-id: "YOUR_APPLICATION_ID"
  llm-api-key: "YOUR_LLM_API_KEY"
  # Optional: Supabase credentials
  supabase-url: ""
  supabase-key: ""
