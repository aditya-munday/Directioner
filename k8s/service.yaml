# =============================================================================
# Kubernetes Service (for health checks and metrics)
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: directioner
  namespace: directioner
  labels:
    app.kubernetes.io/name: directioner
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: directioner
    app.kubernetes.io/component: bot
---
# =============================================================================
# Horizontal Pod Autoscaler
# =============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: directioner
  namespace: directioner
  labels:
    app.kubernetes.io/name: directioner
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: directioner
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
