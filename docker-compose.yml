# =============================================================================
# Directioner Docker Compose Configuration
# =============================================================================

services:
  # Main Directioner bot service
  directioner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: directioner
    restart: unless-stopped
    environment:
      # Discord Configuration
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_APPLICATION_ID=${DISCORD_APPLICATION_ID:-}
      
      # LLM Configuration
      - DIRECTIONER_LLM_PROVIDER=${DIRECTIONER_LLM_PROVIDER:-mock}
      - DIRECTIONER_LLM_API_KEY=${DIRECTIONER_LLM_API_KEY:-}
      - DIRECTIONER_LLM_MODEL=${DIRECTIONER_LLM_MODEL:-llama-3.1-70b-versatile}
      - DIRECTIONER_LLM_BASE_URL=${DIRECTIONER_LLM_BASE_URL:-}
      
      # Memory Configuration
      - DIRECTIONER_MEMORY_ENABLED=${DIRECTIONER_MEMORY_ENABLED:-true}
      - DIRECTIONER_MEMORY_MAX_TURNS=${DIRECTIONER_MEMORY_MAX_TURNS:-200}
      - DIRECTIONER_MEMORY_RETRIEVAL_TURNS=${DIRECTIONER_MEMORY_RETRIEVAL_TURNS:-8}
      - DIRECTIONER_MEMORY_PERSIST_PATH=/app/data/memory/turns.jsonl
      
      # Supabase Configuration (optional)
      - DIRECTIONER_MEMORY_USE_SUPABASE=${DIRECTIONER_MEMORY_USE_SUPABASE:-false}
      - DIRECTIONER_SUPABASE_URL=${DIRECTIONER_SUPABASE_URL:-}
      - DIRECTIONER_SUPABASE_KEY=${DIRECTIONER_SUPABASE_KEY:-}
      
      # Rate Limiting
      - DIRECTIONER_RATE_LIMIT_USER=${DIRECTIONER_RATE_LIMIT_USER:-60}
      - DIRECTIONER_RATE_LIMIT_CHANNEL=${DIRECTIONER_RATE_LIMIT_CHANNEL:-300}
      - DIRECTIONER_RATE_LIMIT_GUILD=${DIRECTIONER_RATE_LIMIT_GUILD:-1000}
      
      # App Configuration
      - DIRECTIONER_APP_NAME=directioner
      - DIRECTIONER_ENVIRONMENT=${DIRECTIONER_ENVIRONMENT:-development}
      - DIRECTIONER_LOG_LEVEL=${DIRECTIONER_LOG_LEVEL:-INFO}
    volumes:
      - directioner-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-m", "directioner.app", "health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - directioner-network

  # Prometheus for metrics collection (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: directioner-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - directioner-network
    profiles:
      - monitoring

  # Grafana for visualization (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: directioner-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - directioner-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # Redis for distributed caching (optional - for multi-instance deployments)
  redis:
    image: redis:7-alpine
    container_name: directioner-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - directioner-network
    profiles:
      - cache

networks:
  directioner-network:
    driver: bridge

volumes:
  directioner-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  redis-data:
    driver: local
