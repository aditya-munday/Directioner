logging:
  level: INFO
  format: json
  redact:
    - DISCORD_BOT_TOKEN
    - authorization

metrics:
  enabled: true
  namespace: directioner
  track:
    - stt_latency_ms
    - llm_first_token_ms
    - tts_first_audio_ms
    - packet_loss_percent
    - shared_memory_lag_frames
    - cpu_percent
    - gpu_percent

