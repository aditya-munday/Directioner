app:
  name: directioner
  environment: production

runtime:
  asyncio_debug: false
  native_worker_threads: 8
  shared_memory_namespace: directioner-prod

audio:
  sample_rate_hz: 48000
  channels: 1
  frame_ms: 20
  pcm_format: s16le
  input_ring_frames: 1024
  output_ring_frames: 1024

conversation:
  context_window_tokens: 32000
  allow_barge_in: true
  interruption_grace_ms: 120

discord:
  # Keep secrets in environment variables instead of checking them into config.
  bot_token:
  application_id:
  native_pool_threads: 2
  shard_count: 0
  cluster_id: 0
  cluster_count: 1
  use_etf: true
  compressed: true
  register_global_commands: false

llm:
  provider: groq
  model: openai/gpt-oss-120b
  api_key:
  base_url:
  max_output_chars: 1800
  temperature: 0.7
  top_p: 1.0
  max_completion_tokens: 8192
  reasoning_effort: medium
  stream_chat: true
  stream_flush_chars: 220
  system_prompt: >
    You are Directioner, a concise Discord assistant.
    Answer helpfully and keep replies suitable for chat.
