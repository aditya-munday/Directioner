app:
  name: directioner
  environment: development
  shutdown_timeout_seconds: 10

runtime:
  asyncio_debug: false

conversation:
  context_window_tokens: 32000

memory:
  enabled: true
  max_turns_per_conversation: 200
  retrieval_turns: 8
  persist_path: "./data/memory/turns.jsonl"
  use_supabase: false
  supabase_url:
  supabase_key:

discord:
  bot_token:
  application_id:
  shard_count: 0
  cluster_id: 0
  cluster_count: 1
  use_etf: false
  compressed: false
  register_global_commands: false

llm:
  provider: groq
  model: llama-3.3-70b-versatile
  api_key:
  base_url:
  max_output_chars: 1800
  stream_chat: false
  temperature: 0.7
  top_p: 1.0
  max_completion_tokens: 1024
  system_prompt: >
    You are Directioner, a concise Discord assistant.
    Answer helpfully and keep replies suitable for chat.
